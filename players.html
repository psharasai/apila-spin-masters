<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Players — EIPL Apila TT League</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="js/theme.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <span class="me-2" style="font-size:1.3rem">🏓</span>EIPL Apila TT League
            </a>
            <button class="theme-toggle-btn ms-auto me-2 d-lg-none" aria-label="Toggle theme"><i class="bi bi-sun-fill"></i></button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="bi bi-bar-chart-fill me-1"></i>Rankings</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle" href="#" role="button" data-bs-toggle="dropdown" id="tournamentsDropdown">
                            <i class="bi bi-calendar-event me-1"></i>Tournaments
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark" id="tournamentMenu"></ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link active" href="players.html"><i class="bi bi-people-fill me-1"></i>Players</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="rules.html"><i class="bi bi-book me-1"></i>Rules</a>
                </li>
                <li class="nav-item">
                        <a class="nav-link" href="h2h.html"><i class="bi bi-arrow-left-right me-1"></i>Head-to-Head</a>
                    </li>
                    <li class="nav-item d-none d-lg-flex align-items-center ms-2">
                        <button class="theme-toggle-btn" aria-label="Toggle theme"><i class="bi bi-sun-fill"></i></button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <h2 class="mb-4"><i class="bi bi-people-fill me-2"></i>All Players</h2>

        <div class="card">
            <div class="card-body p-0">
                <div class="table-responsive">
                    <table class="table table-hover mb-0" id="playersTable">
                        <thead class="table-light">
                            <tr>
                                <th class="sortable" data-sort="name">Player <i class="bi bi-arrow-down-up ms-1 sort-icon"></i></th>
                                <th class="text-center sortable" data-sort="rank">Rank <i class="bi bi-arrow-down-up ms-1 sort-icon"></i></th>
                                <th class="text-center sortable" data-sort="played">Played <i class="bi bi-arrow-down-up ms-1 sort-icon"></i></th>
                                <th class="text-center sortable" data-sort="won">Won <i class="bi bi-arrow-down-up ms-1 sort-icon"></i></th>
                                <th class="text-center sortable" data-sort="lost">Lost <i class="bi bi-arrow-down-up ms-1 sort-icon"></i></th>
                                <th class="text-center sortable" data-sort="winpct">Win % <i class="bi bi-arrow-down-up ms-1 sort-icon"></i></th>
                                <th class="text-center sortable" data-sort="points">Points <i class="bi bi-arrow-down-up ms-1 sort-icon"></i></th>
                            </tr>
                        </thead>
                        <tbody id="playersBody">
                            <tr><td colspan="7" class="text-center text-muted py-4">Loading...</td></tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light text-center py-3 mt-5">
        <small>EIPL Apila TT League &copy; 2026 | Organized by <strong>Apila Spin Masters</strong> | Powered by <i class="bi bi-github"></i> GitHub Pages</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/rankings.js"></script>
    <script src="js/common.js"></script>
    <script src="js/players-list.js"></script>
</body>
</html>
