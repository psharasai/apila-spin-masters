<!DOCTYPE html>
<html lang="en" data-bs-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Tournament — EIPL Apila TT League</title>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700;900&display=swap" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.min.css" rel="stylesheet">
    <link href="css/style.css" rel="stylesheet">
    <script src="js/theme.js"></script>
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark sticky-top">
        <div class="container">
            <a class="navbar-brand fw-bold" href="index.html">
                <img src="img/apila-logo.png" alt="Apila" style="height:28px" class="me-2">TT League
            </a>
            <button class="theme-toggle-btn ms-auto me-2 d-lg-none" aria-label="Toggle theme"><i class="bi bi-sun-fill"></i></button>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto">
                    <li class="nav-item">
                        <a class="nav-link" href="index.html"><i class="bi bi-bar-chart-fill me-1"></i>Rankings</a>
                    </li>
                    <li class="nav-item dropdown">
                        <a class="nav-link dropdown-toggle active" href="#" role="button" data-bs-toggle="dropdown" id="tournamentsDropdown">
                            <i class="bi bi-calendar-event me-1"></i>Tournaments
                        </a>
                        <ul class="dropdown-menu dropdown-menu-dark" id="tournamentMenu"></ul>
                    </li>
                    <li class="nav-item">
                        <a class="nav-link" href="players.html"><i class="bi bi-people-fill me-1"></i>Players</a>
                    </li>
                    <li class="nav-item">
                    <a class="nav-link" href="rules.html"><i class="bi bi-book me-1"></i>Rules</a>
                </li>
                <li class="nav-item">
                        <a class="nav-link" href="h2h.html"><i class="bi bi-arrow-left-right me-1"></i>Head-to-Head</a>
                    </li>
                    <li class="nav-item d-none d-lg-flex align-items-center ms-2">
                        <button class="theme-toggle-btn" aria-label="Toggle theme"><i class="bi bi-sun-fill"></i></button>
                    </li>
                </ul>
            </div>
        </div>
    </nav>

    <main class="container py-4">
        <!-- Tournament Header -->
        <div class="d-flex align-items-center mb-3">
            <a href="index.html" class="btn btn-outline-secondary me-3"><i class="bi bi-arrow-left"></i></a>
            <div>
                <h2 class="mb-0" id="tournamentTitle">Loading...</h2>
                <small class="text-muted" id="tournamentDate"></small>
            </div>
        </div>

        <!-- Tournament Notes -->
        <div class="alert mb-4" id="tournamentNotes" style="display:none; background: rgba(255,102,0,0.08); border: 1px solid rgba(255,102,0,0.15); color: var(--tt-text); border-radius: 10px; font-size: 0.9rem;"></div>

        <!-- Nav tabs for Group / Knockout / All Matches -->
        <ul class="nav nav-tabs nav-fill mb-4" id="tournamentTabs">
            <li class="nav-item">
                <button class="nav-link active" data-bs-toggle="tab" data-bs-target="#groupStage">
                    <i class="bi bi-grid-3x3 me-1"></i><span class="d-none d-sm-inline">Group Stage</span><span class="d-sm-none">Groups</span>
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#knockout">
                    <i class="bi bi-diagram-3 me-1"></i>Knockout
                </button>
            </li>
            <li class="nav-item">
                <button class="nav-link" data-bs-toggle="tab" data-bs-target="#allMatches">
                    <i class="bi bi-list-ul me-1"></i><span class="d-none d-sm-inline">All Matches</span><span class="d-sm-none">All</span>
                </button>
            </li>
        </ul>

        <div class="tab-content">
            <!-- Group Stage -->
            <div class="tab-pane fade show active" id="groupStage">
                <div class="row g-4" id="groupTables"></div>
            </div>

            <!-- Knockout Bracket -->
            <div class="tab-pane fade" id="knockout">
                <div id="knockoutBracket" class="bracket-container"></div>
            </div>

            <!-- All Matches -->
            <div class="tab-pane fade" id="allMatches">
                <div id="matchList"></div>
            </div>
        </div>
    </main>

    <footer class="bg-dark text-light text-center py-3 mt-5">
        <small>EIPL Apila TT League &copy; 2026 | Organized by <strong>Apila Spin Masters</strong> | Powered by <i class="bi bi-github"></i> GitHub Pages</small>
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/data.js"></script>
    <script src="js/rankings.js"></script>
    <script src="js/common.js"></script>
    <script src="js/tournament.js"></script>
</body>
</html>
